version: '3.8'

services:
  openclaw-deepseek-v4-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: OpenClaw-DeepSeek-v4-Telegram
    restart: always
    ports:
      - "18789:18789"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - openclaw-memory:/root/.openclaw/memory
      - openclaw-sessions:/root/.openclaw/agents
      - openclaw-workspace:/root/.openclaw/workspace

volumes:
  openclaw-memory:
  openclaw-sessions:
  openclaw-workspace: